<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-header { background: #198754; color: white; border-radius: 16px 16px 0 0; font-weight: bold; }
        .login-card { max-width: 400px; margin: 100px auto; }
        .table-container { max-height: 500px; overflow-y: auto; }
        .expired { color: #dc3545; background-color: #fff3f3; }
        .user-badge { background: #e9ecef; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .role-tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; }
        .role-fehd { background: #cfe2ff; color: #084298; }
        .role-weighbridge { background: #d1e7dd; color: #0f5132; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; justify-content: center; align-items: center; color: white; font-size: 20px; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="bg-dark p-4 rounded">處理中，請稍候...</div>
</div>

<!-- 登入頁面 -->
<div id="loginPage" class="container">
    <div class="card login-card">
        <div class="card-header text-center">
            <h4 class="m-0" id="loginTitle">🚛 車輛管理系統</h4>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">選擇用戶</label>
                <select id="userId" class="form-select form-select-lg">
                    <option value="">-- 載入中... --</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">密碼</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="請輸入密碼">
            </div>
            <button onclick="doLogin()" class="btn btn-success w-100 py-2" id="loginBtn">登入系統</button>
        </div>
    </div>
</div>

<!-- 主頁面 -->
<div id="mainPage" style="display: none;">
    <div class="container">
        <!-- 頂部欄 -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="text-success" id="mainTitle">🚛 車輛管理系統</h1>
            <div>
                <span class="user-badge" id="userInfo"></span>
                <button onclick="logout()" class="btn btn-outline-secondary btn-sm ms-2">登出</button>
            </div>
        </div>
        
        <!-- 可查看區域提示 -->
        <div class="alert alert-info small" id="viewHint"></div>
        
        <!-- 新增/編輯表單（轉運站職員隱藏） -->
        <div id="vehicleFormSection" class="card">
            <div class="card-header">📝 單筆車輛資料</div>
            <div class="card-body">
                <form id="vehicleForm">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label">車牌號碼 *</label>
                            <input type="text" id="plate" class="form-control" required placeholder="AB1234">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">PGVW (噸) *</label>
                            <input type="number" id="pgvw" class="form-control" step="0.1" required placeholder="5.5">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">每日上限</label>
                            <input type="number" id="dailyLimit" class="form-control" value="5" placeholder="5">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">開始日期</label>
                            <input type="date" id="startDate" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">有效日期 *</label>
                            <input type="date" id="expiryDate" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">凌晨授權</label>
                            <select id="midnight" class="form-select">
                                <option value="N">否</option>
                                <option value="Y">是</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">所屬區域</label>
                            <select id="district" class="form-select" required>
                                <option value="">請選擇</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">備註</label>
                            <input type="text" id="remark" class="form-control" placeholder="可選">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100">✅ 儲存車輛資料</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 批量操作區（轉運站職員隱藏） -->
        <div id="batchSection" class="card">
            <div class="card-header">📁 批量操作</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">批量上傳 Excel</label>
                        <input type="file" id="excelFile" class="form-control" accept=".xlsx, .xls, .csv">
                        <div class="form-text small">Excel 欄位：車牌、PGVW、開始日期、有效日期、每日上限、凌晨時段(Y/N)、區域、備註</div>
                        <button onclick="batchUpload()" class="btn btn-outline-primary mt-2">⬆️ 上傳並自動合併</button>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">匯出資料</label>
                        <div class="d-flex gap-2">
                            <button onclick="exportCSV()" class="btn btn-outline-success">📥 匯出 CSV</button>
                            <button onclick="exportExcel()" class="btn btn-outline-info">📊 匯出 Excel</button>
                            <button onclick="loadVehicles()" class="btn btn-outline-secondary">🔄 刷新列表</button>
                        </div>
                    </div>
                </div>
                <div id="batchResult" style="display: none;" class="mt-3 alert alert-info small">
                    <strong>上傳結果：</strong>
                    <div id="batchResultContent"></div>
                </div>
            </div>
        </div>
        
        <!-- 車輛列表 -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>📋 授權車輛清單（自動保留最長有效期）</span>
                <span class="badge bg-light text-dark" id="recordCount">0 筆</span>
            </div>
            <div class="card-body table-container">
                <table class="table table-bordered table-hover table-sm">
                    <thead>
                        <tr style="position: sticky; top: 0; background: white;">
                            <th>車牌</th><th>PGVW</th><th>每日上限</th><th>開始日期</th><th>有效日期</th>
                            <th>凌晨</th><th>區域</th><th>備註</th><th>建立者</th><th>操作</th>
                         </tr>
                    </thead>
                    <tbody id="vehicleList">
                        <tr><td colspan="10" class="text-center text-muted">載入中......</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9Z0fSeNPABKL-RkJU5cnIo7YLX9s18tT5CH4iM7kzaru-F1gsyoHCWe-tfRELsKDFcA/exec";
    let currentSession = null;
    let availableDistricts = [];
    let currentRole = "fehd"; // fehd 或 weighbridge
    
    // ==================== 獲取 URL 參數 ====================
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    
    // ==================== 根據角色初始化頁面 ====================
    function initByRole() {
        currentRole = getUrlParameter('role') || 'fehd';
        
        if (currentRole === 'fehd') {
            // 食環署模式
            document.getElementById('loginTitle').innerHTML = '👨‍💼 食環署車輛管理系統';
            document.getElementById('mainTitle').innerHTML = '👨‍💼 食環署車輛管理系統';
            document.getElementById('loginBtn').innerHTML = '食環署登入';
            document.getElementById('vehicleFormSection').style.display = 'block';
            document.getElementById('batchSection').style.display = 'block';
        } else {
            // 轉運站模式（只讀，不能編輯）
            document.getElementById('loginTitle').innerHTML = '⚖️ 轉運站車輛查詢系統';
            document.getElementById('mainTitle').innerHTML = '⚖️ 轉運站車輛查詢系統';
            document.getElementById('loginBtn').innerHTML = '轉運站登入';
            document.getElementById('vehicleFormSection').style.display = 'none';
            document.getElementById('batchSection').style.display = 'none';
        }
        
        loadUserList();
    }
    
    // ==================== 顯示/隱藏 Loading ====================
    function showLoading(show) {
        const loader = document.getElementById('loadingOverlay');
        loader.style.display = show ? 'flex' : 'none';
    }
    
    // ==================== 動態載入用戶列表（根據角色過濾） ====================
async function loadUserList() {
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getUserList' })
        });
        const result = await response.json();
        
        if (result.success && result.users) {
            const select = document.getElementById('userId');
            select.innerHTML = '<option value="">-- 請選擇用戶 --</option>';
            
            // 根據角色過濾用戶（使用 role 欄位，而不是 type）
            const filteredUsers = result.users.filter(u => {
                if (currentRole === 'fehd') {
                    // 食環署模式：顯示區域主管 或 超級管理員
                    return u.role === '區域主管' || u.role === '超級管理員';
                } else {
                    // 轉運站模式：顯示轉運站職員
                    return u.role === '轉運站職員';
                }
            });
            
            filteredUsers.forEach(u => {
                select.innerHTML += `<option value="${u.id}">${u.id}</option>`;
            });
            
            if (filteredUsers.length === 0) {
                select.innerHTML = '<option value="">-- 暫無用戶，請聯絡管理員 --</option>';
            }
        } else {
            console.error("載入用戶列表失敗", result.msg);
            document.getElementById('userId').innerHTML = '<option value="">-- 載入失敗，請刷新 --</option>';
        }
    } catch (err) {
        console.error("網路錯誤", err);
        document.getElementById('userId').innerHTML = '<option value="">-- 網路錯誤 --</option>';
    }
}
    
    // ==================== 登入 ====================
    async function doLogin() {
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;
        
        if (!userId) {
            alert("請選擇用戶");
            return;
        }
        if (!password) {
            alert("請輸入密碼");
            return;
        }
        
        showLoading(true);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', userId: userId, password: password })
            });
            const result = await response.json();
            
            if (result.success) {
                currentSession = result.session;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                
                // 顯示用戶資訊
                let roleClass = currentRole === 'fehd' ? 'role-fehd' : 'role-weighbridge';
                let roleName = currentRole === 'fehd' ? '食環署' : '轉運站';
                document.getElementById('userInfo').innerHTML = `${result.session.userId} <span class="role-tag ${roleClass}">${roleName}</span>`;
                
                // 顯示可查看區域
                const viewText = result.session.viewDistricts === "all" ? "所有區域" : result.session.viewDistricts.join("、");
                document.getElementById('viewHint').innerHTML = `🔍 您可查看的區域：<strong>${viewText}</strong>`;
                
                // 設定區域下拉選單（食環署需要）
                if (currentRole === 'fehd') {
                    if (result.session.viewDistricts === "all") {
                        availableDistricts = ["屯門", "西九龍", "沙田", "葵青", "觀塘", "元朗"];
                    } else {
                        availableDistricts = result.session.viewDistricts;
                    }
                    const districtSelect = document.getElementById('district');
                    districtSelect.innerHTML = '<option value="">請選擇</option>';
                    availableDistricts.forEach(d => {
                        districtSelect.innerHTML += `<option value="${d}">${d}</option>`;
                    });
                }
                
                loadVehicles();
            } else {
                alert("登入失敗：" + result.msg);
            }
        } catch (err) {
            alert("網路錯誤：" + err);
        } finally {
            showLoading(false);
        }
    }
    
    function logout() {
        currentSession = null;
        document.getElementById('loginPage').style.display = 'block';
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('password').value = "";
        document.getElementById('userId').value = "";
        loadUserList();
    }
    
    // ==================== 載入車輛列表 ====================
    async function loadVehicles() {
        if (!currentSession) return;
        
        showLoading(true);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getVehicles', session: currentSession })
            });
            const result = await response.json();
            
            if (result.success) {
                const tbody = document.getElementById('vehicleList');
                
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">暫無資料</td></tr>';
                    document.getElementById('recordCount').innerText = "0 筆";
                    return;
                }
                
                tbody.innerHTML = result.data.map(v => `
                    <tr class="${v.isExpired ? 'expired' : ''}">
                        <td><strong>${escapeHtml(v.plate)}</strong></td>
                        <td>${v.pgvw}</td>
                        <td>${v.dailyLimit || 5}</td>
                        <td>${v.startDate || '-'}</td>
                        <td class="${v.isExpired ? 'text-danger fw-bold' : ''}">${v.expiryDate || '-'}</td>
                        <td>${v.midnight === 'Y' ? '✅ 是' : '❌ 否'}</td>
                        <td>${escapeHtml(v.district)}</td>
                        <td>${escapeHtml(v.remark) || '-'}</td>
                        <td>${escapeHtml(v.createdBy) || '-'}</td>
                        <td>${currentRole === 'fehd' ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteVehicle('${v.plate}')">刪除</button>` : '🔍 唯讀'}</td>
                     </tr>
                `).join('');
                
                document.getElementById('recordCount').innerText = `${result.data.length} 筆`;
            } else {
                alert("載入失敗：" + result.msg);
            }
        } catch (err) {
            alert("網路錯誤：" + err);
        } finally {
            showLoading(false);
        }
    }
    
    // ==================== 單筆新增（只有食環署可用） ====================
    if (document.getElementById('vehicleForm')) {
        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentSession || currentRole !== 'fehd') {
                alert("您沒有權限編輯車輛");
                return;
            }
            
            const data = {
                plate: document.getElementById('plate').value.trim().toUpperCase(),
                pgvw: parseFloat(document.getElementById('pgvw').value),
                dailyLimit: parseInt(document.getElementById('dailyLimit').value) || 5,
                startDate: document.getElementById('startDate').value,
                expiryDate: document.getElementById('expiryDate').value,
                district: document.getElementById('district').value,
                midnight: document.getElementById('midnight').value,
                remark: document.getElementById('remark').value
            };
            
            if (!data.plate || isNaN(data.pgvw) || data.pgvw <= 0 || !data.expiryDate || !data.district) {
                alert("請填寫完整資料");
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addVehicle', data: data, session: currentSession })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert(result.msg);
                    document.getElementById('plate').value = "";
                    document.getElementById('pgvw').value = "";
                    document.getElementById('startDate').value = "";
                    document.getElementById('expiryDate').value = "";
                    document.getElementById('remark').value = "";
                    document.getElementById('midnight').value = "N";
                    loadVehicles();
                } else {
                    alert("操作失敗：" + result.msg);
                }
            } catch (err) {
                alert("網路錯誤：" + err);
            } finally {
                showLoading(false);
            }
        });
    }
    
    // ==================== 批量上傳（只有食環署可用） ====================
    async function batchUpload() {
        if (!currentSession || currentRole !== 'fehd') {
            alert("您沒有權限上傳車輛");
            return;
        }
        
        const file = document.getElementById('excelFile').files[0];
        if (!file) {
            alert("請選擇 Excel 檔案");
            return;
        }
        
        showLoading(true);
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                const dataList = [];
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row[0] || String(row[0]).trim() === "") continue;
                    
                    const district = row[6] ? String(row[6]).trim() : "";
                    if (district && !availableDistricts.includes(district)) {
                        alert(`您沒有權限上傳區域 "${district}" 的車輛`);
                        continue;
                    }
                    
                    dataList.push({
                        plate: String(row[0]).trim().toUpperCase(),
                        pgvw: parseFloat(row[1]) || 0,
                        startDate: formatExcelDate(row[2]),
                        expiryDate: formatExcelDate(row[3]),
                        dailyLimit: parseInt(row[4]) || 5,
                        midnight: String(row[5] || 'N').toUpperCase() === 'Y' ? 'Y' : 'N',
                        district: district,
                        remark: row[7] ? String(row[7]) : ""
                    });
                }
                
                const validData = dataList.filter(d => d.plate && d.pgvw > 0 && d.expiryDate && d.district);
                
                if (validData.length === 0) {
                    alert("沒有有效的車輛資料");
                    showLoading(false);
                    return;
                }
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'batchUpload', dataList: validData, session: currentSession })
                });
                const result = await response.json();
                
                if (result.success) {
                    const resultDiv = document.getElementById('batchResult');
                    const contentDiv = document.getElementById('batchResultContent');
                    contentDiv.innerHTML = `<div>✅ ${result.msg}</div>`;
                    resultDiv.style.display = 'block';
                    loadVehicles();
                    setTimeout(() => resultDiv.style.display = 'none', 5000);
                } else {
                    alert("上傳失敗：" + result.msg);
                }
            } catch (err) {
                alert("解析檔案失敗：" + err);
            } finally {
                showLoading(false);
                document.getElementById('excelFile').value = "";
            }
        };
        reader.readAsArrayBuffer(file);
    }
    
    function formatExcelDate(value) {
        if (!value) return "";
        if (value instanceof Date) return value.toISOString().split('T')[0];
        if (typeof value === 'number') {
            const date = new Date((value - 25569) * 86400 * 1000);
            return date.toISOString().split('T')[0];
        }
        const str = String(value).trim();
        if (str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
        const parsed = new Date(str);
        if (!isNaN(parsed.getTime())) return parsed.toISOString().split('T')[0];
        return "";
    }
    
    // ==================== 刪除車輛 ====================
    async function deleteVehicle(plate) {
        if (!currentSession || currentRole !== 'fehd') {
            alert("您沒有權限刪除車輛");
            return;
        }
        if (!confirm(`確定要刪除車輛 ${plate} 嗎？`)) return;
        
        showLoading(true);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'deleteVehicle', plate: plate, session: currentSession })
            });
            const result = await response.json();
            
            if (result.success) {
                alert(result.msg);
                loadVehicles();
            } else {
                alert("刪除失敗：" + result.msg);
            }
        } catch (err) {
            alert("網路錯誤：" + err);
        } finally {
            showLoading(false);
        }
    }
    
    // ==================== 匯出 ====================
    async function exportCSV() {
        if (!currentSession) return;
        const params = new URLSearchParams({
            action: 'exportVehicles',
            session: JSON.stringify(currentSession)
        });
        window.open(API_URL + "?" + params.toString(), "_blank");
    }
    
    async function exportExcel() {
        if (!currentSession) return;
        
        showLoading(true);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getVehicles', session: currentSession })
            });
            const result = await response.json();
            
            if (result.success && result.data.length > 0) {
                const wsData = [["車牌", "PGVW", "開始日期", "有效日期", "每日上限", "凌晨授權", "區域", "備註", "建立者"]];
                result.data.forEach(v => {
                    wsData.push([
                        v.plate, v.pgvw, v.startDate || "", v.expiryDate || "",
                        v.dailyLimit || 5, v.midnight === 'Y' ? '是' : '否',
                        v.district, v.remark || "", v.createdBy || ""
                    ]);
                });
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "車輛清單");
                XLSX.writeFile(wb, `車輛清單_${new Date().toISOString().split('T')[0]}.xlsx`);
            } else {
                alert("無資料可匯出");
            }
        } catch (err) {
            alert("匯出失敗：" + err);
        } finally {
            showLoading(false);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 初始化
    initByRole();
</script>
